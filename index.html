<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aleph Gigs</title>
<link rel="manifest" href="manifest.webmanifest">

<style>
:root{
--bg:#0b0b0b;
--card:#151515;
--text:#ffffff;
--muted:#9a9a9a;
--green:#2ecc71;
--gold:#f1c40f;
--red:#e74c3c;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,system-ui;
}

.screen{
padding:16px;
max-width:700px;
margin:auto;
}

.card{
background:var(--card);
border-radius:16px;
padding:16px;
margin-bottom:12px;
}

button{
background:#222;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-size:16px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:10px;
border:none;
background:#222;
color:white;
font-size:16px;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.green{background:var(--green);}
.gold{background:var(--gold);}
.red{background:var(--red);}

.story{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.story h1{font-size:36px;}
.story h2{font-size:24px;color:var(--muted);}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

const STORAGE_KEY="aleph_gigs"

function save(data){
localStorage.setItem(STORAGE_KEY,JSON.stringify(data))
}

function load(){
return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")
}

function daysTo(date){
return Math.ceil((new Date(date)-new Date())/86400000)
}

function health(g){
if(g.state!=="Ticketed") return "gold"
let ratio=(g.sold||0)/(g.target||1)
let d=daysTo(g.date)

if(d<7 && ratio<.5) return "red"
if(ratio>.8) return "green"
return "gold"
}

let gigs=load()

function render(){

document.getElementById("app").innerHTML=`

<div class="screen">

<div class="top">
<h2>Aleph Gigs</h2>
<button onclick="add()">+</button>
</div>

${gigs.map((g,i)=>`

<div class="card" onclick="openGig(${i})">

<div class="top">
<strong>${g.title}</strong>
<span class="badge ${health(g)}">${health(g)}</span>
</div>

<div>${g.date}</div>
<div>${g.venue}</div>
<div>${g.city||""}</div>

</div>

`).join("")}

</div>
`
}

function add(){
gigs.push({
title:"New Gig",
date:new Date().toISOString().slice(0,10),
venue:"",
city:"",
state:"TBC",
sold:0,
target:0
})
save(gigs)
render()
}

function openGig(i){
let g=gigs[i]

document.getElementById("app").innerHTML=`

<div class="screen">

<button onclick="render()">Back</button>

<h2>${g.title}</h2>

<label>Title</label>
<input value="${g.title}" onchange="gigs[${i}].title=this.value;save(gigs)">

<label>Date</label>
<input type="date" value="${g.date}" onchange="gigs[${i}].date=this.value;save(gigs)">

<label>Venue</label>
<input value="${g.venue}" onchange="gigs[${i}].venue=this.value;save(gigs)">

<label>City</label>
<input value="${g.city}" onchange="gigs[${i}].city=this.value;save(gigs)">

<label>Status</label>
<select onchange="gigs[${i}].state=this.value;save(gigs)">
<option ${g.state=="Ticketed"?"selected":""}>Ticketed</option>
<option ${g.state=="Free"?"selected":""}>Free</option>
<option ${g.state=="TBC"?"selected":""}>TBC</option>
</select>

<label>Tickets sold</label>
<input type="number" value="${g.sold||0}" onchange="gigs[${i}].sold=this.value;save(gigs)">

<label>Target</label>
<input type="number" value="${g.target||0}" onchange="gigs[${i}].target=this.value;save(gigs)">

<button onclick="story(${i})">Story Mode</button>

<button onclick="del(${i})">Delete</button>

</div>
`
}

function del(i){
gigs.splice(i,1)
save(gigs)
render()
}

function story(i){
let g=gigs[i]

document.getElementById("app").innerHTML=`

<div class="story">

<h1>${g.title}</h1>
<h2>${g.venue}</h2>
<p>${g.city}</p>
<p>${g.date}</p>
<h2>${g.state}</h2>

<button onclick="render()">Close</button>

</div>
`
}

render()

</script>

</body>
</html>
